<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Réservation bateau</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>


<body class="bg-gray-100">


<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow">


<h1 class="text-3xl font-bold text-blue-700 mb-6">
🚢 Réserver votre traversée
</h1>



<form id="reservationForm" class="space-y-4">



<input 
id="nom_client"
type="text"
placeholder="Nom du client"
class="w-full border p-3 rounded"
required
>



<input 
id="bateau_id"
type="text"
placeholder="ID bateau (ex: BATEAU-7842)"
class="w-full border p-3 rounded"
required
>



<input 
id="date_depart"
type="date"
class="w-full border p-3 rounded"
required
>



<input 
id="port_depart"
type="text"
placeholder="Port départ"
class="w-full border p-3 rounded"
required
>



<input 
id="port_arrivee"
type="text"
placeholder="Port arrivée"
class="w-full border p-3 rounded"
required
>



<input 
id="nb_passagers"
type="number"
placeholder="Nombre de passagers"
class="w-full border p-3 rounded"
required
>



<button
type="submit"
class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700">

Confirmer la réservation

</button>


</form>


<div id="resultat" class="mt-6 text-center font-bold"></div>


</div>


<script src="script.js"></script>


</body>

</html>
