<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administrateur</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

        <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">
            🔐 Connexion Administrateur
        </h1>

        <form id="loginForm">

            <label class="block mb-2 font-semibold">
                Nom d'utilisateur
            </label>

            <input
                type="text"
                id="username"
                class="w-full border rounded-lg p-3 mb-5"
                placeholder="admin"
                required>

            <label class="block mb-2 font-semibold">
                Mot de passe
            </label>

            <input
                type="password"
                id="password"
                class="w-full border rounded-lg p-3 mb-6"
                placeholder="********"
                required>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg">

                Se connecter

            </button>

        </form>

        <p id="message" class="text-red-600 text-center mt-4"></p>

    </div>

    <script>

        document.getElementById("loginForm").addEventListener("submit", function(e){

            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if(username === "admin" && password === "admin123"){

                window.location.href = "/admin.html";

            }else{

                document.getElementById("message").textContent =
                    "Nom d'utilisateur ou mot de passe incorrect.";

            }

        });

    </script>

</body>

</html>
