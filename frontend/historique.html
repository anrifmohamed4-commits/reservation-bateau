<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historique Réservations</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100">


<div class="max-w-6xl mx-auto p-10">


<h1 class="text-4xl font-bold text-blue-900 mb-10 text-center">

🚢 Mes réservations

</h1>



<div id="liste"
class="grid gap-6">


</div>


</div>





<script>


async function chargerHistorique(){


const response = await fetch(
"/api/reservations"
);


const reservations = await response.json();



const liste =
document.getElementById("liste");



liste.innerHTML="";



reservations.forEach(reservation => {



liste.innerHTML += `


<div class="bg-white rounded-xl shadow p-6">


<h2 class="text-xl font-bold">

${reservation.port_depart}
→
${reservation.port_arrivee}

</h2>


<p class="mt-3">

👤 Client :
${reservation.nom_client}

</p>


<p>

📅 Date :
${reservation.date_depart}

</p>


<p>

💺 Sièges :
${reservation.sieges || "Non choisi"}

</p>


<p>

👥 Passagers :
${reservation.nb_passagers}

</p>


<p class="font-bold text-blue-600 mt-3">

💰 ${reservation.prix_total} €

</p>


</div>


`;



});


}



chargerHistorique();


</script>


</body>

</html>
